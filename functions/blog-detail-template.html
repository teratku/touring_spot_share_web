              <span class="menu-icon">🔒</span>
              <span>プライバシーポリシー</span>
            </a>
            <a href="/termsofservice/termsofservice.html" class="menu-item">
              <span class="menu-icon">📋</span>
              <span>利用規約</span>
            </a>
          </nav>
        </div>
      </div>

      <!-- メインコンテンツ -->
      <div class="container">
        <!-- ローディング状態 -->
        <div v-if="isLoading" class="loading">
          <div class="spinner"></div>
          <p>ブログを読み込み中...</p>
        </div>

        <!-- エラー状態 -->
        <div v-else-if="error" class="error-state">
          <div class="error-icon">⚠️</div>
          <h3>エラーが発生しました</h3>
          <p>{{ error }}</p>
          <button class="back-btn" @click="goBack" style="margin-top: 24px; background: #E63946;">
            戻る
          </button>
        </div>

        <!-- ブログ詳細表示 -->
        <template v-else-if="blog">
          <!-- ブログヘッダー -->
          <div class="blog-header">
            <div class="blog-category">{{ getCategoryLabel(blog.category) }}</div>
            <h1 class="blog-title">{{ blog.title }}</h1>
            
            <div class="blog-meta">
              <div class="author-info" @click="goToUser(blog.authorId)">
                <img 
                  v-if="authorInfo?.userIcon" 
                  :src="authorInfo.userIcon" 
                  :alt="authorInfo.userName"
                  class="author-icon"
                  loading="eager"
                >
                <div v-else class="author-icon" style="background: #00A8C6; display: flex; align-items: center; justify-content: center; font-size: 20pt; color: white;">👤</div>
                <span class="author-name">{{ authorInfo?.userName || 'Unknown' }}</span>
              </div>
              
              <div class="meta-item">
                <span>📅</span>
                <span>{{ formatDate(blog.createdAt) }}</span>
              </div>
              
              <div class="meta-item">
                <span>👁️</span>
                <span>{{ blog.views }}回閲覧</span>
              </div>
              
              <div class="meta-item">
                <span>❤️</span>
                <span>{{ blog.likes }}いいね</span>
              </div>
            </div>

            <div v-if="blog.tags && blog.tags.length > 0" class="blog-tags">
              <span v-for="tag in blog.tags" :key="tag" class="tag">{{ tag }}</span>
            </div>
          </div>

          <!-- サムネイル画像 -->
          <div v-if="blog.thumbnail" class="blog-thumbnail">
            <img :src="blog.thumbnail" :alt="blog.title" loading="eager">
          </div>

          <!-- ブログコンテンツ -->
          <div class="blog-content">
            <div class="markdown-body" v-html="renderedContent"></div>
          </div>

          <!-- アクションボタン -->
          <div class="blog-actions">
            <button 
              class="action-btn like-btn"
              :class="{ liked: hasLiked }"
              @click="toggleLike"
            >
              <span>{{ hasLiked ? '❤️' : '🤍' }}</span>
              <span>{{ blog.likes }} いいね</span>
            </button>
            
            <button class="action-btn share-btn" @click="shareBlog">
              <span>📤</span>
              <span>シェア</span>
            </button>
            <template v-if="isLocalhost">
              <button class="action-btn edit-btn" @click="editBlog">
                <span>✏️</span>
                <span>編集</span>
              </button>
              
              <button class="action-btn delete-btn" @click="deleteBlog">
                <span>🗑️</span>
                <span>削除</span>
              </button>
            </template>
          </div>

          <!-- 関連記事 -->
          <div v-if="relatedPosts.length > 0" class="related-posts">
            <h2 class="section-title">📚 関連記事</h2>
            <div class="related-posts-grid">
              <div 
                v-for="post in relatedPosts"
                :key="post.id"
                class="related-post-card"
                @click="goToBlog(post.id)"
              >
                <img 
                  v-if="post.thumbnail" 
                  :src="post.thumbnail" 
                  :alt="post.title"
                  class="related-post-image"
                  loading="lazy"
                >
                <div v-else class="related-post-image" style="display: flex; align-items: center; justify-content: center; font-size: 48pt; background: #E0E0E0;">📝</div>
                
                <div class="related-post-info">
                  <div class="related-post-title">{{ post.title }}</div>
                  <div class="related-post-meta">
                    <span>👁️ {{ post.views }}</span>
                    <span>❤️ {{ post.likes }}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <footer class="page-footer">
          <p>© 2025 ツーリングスポットシェア All rights reserved.</p>
        </footer>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      let db;
      let storage;

      function waitForFirebase() {
        return new Promise((resolve, reject) => {
          if (typeof firebase !== 'undefined') {
            resolve();
            return;
          }

          let attempts = 0;
          const maxAttempts = 50;
          const checkInterval = setInterval(() => {
            attempts++;
            if (typeof firebase !== 'undefined') {
              clearInterval(checkInterval);
              resolve();
            } else if (attempts >= maxAttempts) {
              clearInterval(checkInterval);
              reject(new Error('Firebase の読み込みに失敗しました'));
            }
          }, 100);
        });
      }

      function waitForMarked() {
        return new Promise((resolve, reject) => {
          if (typeof marked !== 'undefined') {
            resolve();
            return;
          }

          let attempts = 0;
          const maxAttempts = 50;
          const checkInterval = setInterval(() => {
            attempts++;
            if (typeof marked !== 'undefined') {
              clearInterval(checkInterval);
              resolve();
            } else if (attempts >= maxAttempts) {
              clearInterval(checkInterval);
              reject(new Error('Marked.js の読み込みに失敗しました'));
            }
          }, 100);
        });
      }

      function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
      }

      document.addEventListener('DOMContentLoaded', async function() {
        try {
          await waitForFirebase();
          await waitForMarked();

          const app = createApp({
            data() {
              return {
                blog: null,
                authorInfo: null,
                embeddedSpots: {},
                embeddedRoutes: {},
                relatedPosts: [],
                isLoading: true,
                error: null,
                blogId: null,
                showMenu: false,
                hasLiked: false,
                renderedContent: '',
                isLocalhost: false,
                isSaving: false,  // 追加
                toast: {  // 追加
                  show: false,
                  message: '',
                  type: 'success'
                }
              };
            },
            async mounted() {
              this.isLocalhost = window.location.hostname === 'localhost' || 
                     window.location.hostname === '127.0.0.1';
              try {
                await waitForFirebase();
                
                const firebaseApp = firebase.app();
                db = firebase.firestore();
                storage = firebase.storage();
                
                this.blogId = getQueryParam('id');
                
                if (!this.blogId) {
                  this.error = 'ブログIDが指定されていません';
                  this.isLoading = false;
                  return;
                }

                // ローカルストレージからいいね状態をチェック
                this.hasLiked = localStorage.getItem(`blog_liked_${this.blogId}`) === 'true';

                await this.loadBlogDetail();
                
                document.addEventListener('keydown', this.handleKeydown);
              } catch (e) {
                console.error('初期化エラー:', e);
                this.error = e.message;
                this.isLoading = false;
              }
            },
            beforeUnmount() {
              document.removeEventListener('keydown', this.handleKeydown);
            },
            methods: {
              async loadBlogDetail() {
                try {
                  // Firestoreからブログ記事を取得
                  const doc = await db.collection('blog_posts').doc(this.blogId).get();
                  
                  if (!doc.exists) {
                    this.error = 'ブログが見つかりませんでした';
                    this.isLoading = false;
                    return;
                  }

                  const data = doc.data();
                  this.blog = {
                    id: doc.id,
                    ...data
                  };

                  // タイムスタンプをDateオブジェクトに変換
                  if (this.blog.createdAt && this.blog.createdAt.toDate) {
                    this.blog.createdAt = this.blog.createdAt.toDate();
                  }
                  if (this.blog.updatedAt && this.blog.updatedAt.toDate) {
                    this.blog.updatedAt = this.blog.updatedAt.toDate();
                  }

                  // 閲覧数カウントアップ
                  await db.collection('blog_posts').doc(this.blogId).update({
                    views: firebase.firestore.FieldValue.increment(1)
                  });
                  
                  // ローカルでも閲覧数を増やす
                  this.blog.views = (this.blog.views || 0) + 1;

                  // コンテンツから埋め込みスポット・ルートIDを抽出
                  this.extractEmbeddedIds();

                  // 作者情報を取得
                  await this.loadAuthorInfo();

                  // 埋め込みコンテンツを取得
                  await this.loadEmbeddedContent();

                  // Markdownをレンダリング
                  this.renderMarkdown();

                  // 関連記事を取得
                  await this.loadRelatedPosts();

                  this.isLoading = false;
                } catch (error) {
                  console.error('ブログ読み込みエラー:', error);
                  this.error = error.message;
                  this.isLoading = false;
                }
              },
              extractEmbeddedIds() {
                const content = this.blog.content || '';
                
                // スポットIDを抽出
                const spotMatches = content.match(/\{\{spot:([a-zA-Z0-9_-]+)\}\}/g);
                this.blog.referencedSpots = spotMatches 
                  ? spotMatches.map(match => match.replace(/\{\{spot:|}\}/g, ''))
                  : [];

                // ルートIDを抽出
                const routeMatches = content.match(/\{\{route:([a-zA-Z0-9_-]+)\}\}/g);
                this.blog.referencedRoutes = routeMatches 
                  ? routeMatches.map(match => match.replace(/\{\{route:|}\}/g, ''))
                  : [];
              },

              async loadAuthorInfo() {
                // 全てのブログは開発者投稿として表示
                this.authorInfo = {
                  userName: 'Touring Spot Share 開発者',
                  userIcon: null
                };
              },

              async loadEmbeddedContent() {
                // スポット情報を取得
                if (this.blog.referencedSpots && this.blog.referencedSpots.length > 0) {
                  const spotPromises = this.blog.referencedSpots.map(async (spotId) => {
                    try {
                      const doc = await db.collection('imagedownload').doc(spotId).get();
                      if (doc.exists) {
                        this.embeddedSpots[spotId] = {
                          id: doc.id,
                          ...doc.data()
                        };
                      }
                    } catch (error) {
                      console.error(`スポット情報取得エラー (${spotId}):`, error);
                    }
                  });
                  
                  await Promise.all(spotPromises);
                }

                // ルート情報を取得
                if (this.blog.referencedRoutes && this.blog.referencedRoutes.length > 0) {
                  const routePromises = this.blog.referencedRoutes.map(async (routeId) => {
                    try {
                      const doc = await db.collection('shared_routes').doc(routeId).get();
                      if (doc.exists) {
                        this.embeddedRoutes[routeId] = {
                          id: doc.id,
                          ...doc.data()
                        };
                      }
                    } catch (error) {
                      console.error(`ルート情報取得エラー (${routeId}):`, error);
                    }
                  });
                  
                  await Promise.all(routePromises);
                }
              },

              renderMarkdown() {
                let content = this.blog.content;

                // {{spot:xxx}} を置換
                content = content.replace(/\{\{spot:([^}]+)\}\}/g, (match, spotId) => {
                  const spot = this.embeddedSpots[spotId];
                  if (spot) {
                    const imageUrl = spot.locationImageURLs?.[0] || '';
                    const name = spot.locality || spot.administrative || '不明な場所';
                    const location = spot.administrative || '';
                    const visits = spot.locationVisitCount || 0;

                    return `<div class="embedded-card spot-card" onclick="window.location.href='/detail.html?id=${spotId}'">
                      <div class="spot-image-container">
                        <img src="${imageUrl}" alt="${name}" class="spot-image" loading="lazy">
                      </div>
                      <div class="spot-info">
                        <div class="spot-label">📍 スポット</div>
                        <div class="spot-name">${name}</div>
                        <div class="spot-meta">
                          <div>🗺️ ${location}</div>
                          <div>🔢 ${visits}回訪問</div>
                        </div>
                      </div>
                    </div>`;
                  }
                  return match;
                });

                // {{route:xxx}} を置換
                content = content.replace(/\{\{route:([^}]+)\}\}/g, (match, routeId) => {
                  const route = this.embeddedRoutes[routeId];
                  if (route) {
                    const title = route.title || 'ルート';
                    const distance = (route.distance / 1000).toFixed(1);
                    const date = route.createdAt ? new Date(route.createdAt.seconds * 1000).toLocaleDateString('ja-JP') : '';
                    const userName = route.userName || '';
                    const status = route.isPublic ? '🌐 公開中' : '🔒 非公開';
                    const imageUrl = route.coverImageUrl || '';

                    return `<div class="embedded-card route-card" onclick="window.location.href='/route-detail.html?id=${routeId}'">
                      <div class="route-image-container">
                        ${imageUrl ? `<img src="${imageUrl}" alt="${title}" class="route-image" loading="lazy">` : '🗺️'}
                      </div>
                      <div class="route-info">
                        <div class="route-label">🗺️ ルート</div>
                        <div class="route-title">${title}</div>
                        <div class="route-meta">
                          <div>📍 距離: ${distance} km</div>
                          <div>🗓 ${date}</div>
                          <div>👤 ${userName}</div>
                          <div>${status}</div>
                        </div>
                      </div>
                    </div>`;
                  }
                  return match;
                });

                // Markdownをレンダリング
                this.renderedContent = marked.parse(content);
              },

              async loadRelatedPosts() {
                try {
                  // 同じカテゴリの公開記事を閲覧数順で取得
                  const snapshot = await db.collection('blog_posts')
                    .where('category', '==', this.blog.category)
                    .where('status', '==', 'published')
                    .orderBy('views', 'desc')
                    .limit(4)
                    .get();
                  
                  this.relatedPosts = [];
                  snapshot.forEach(doc => {
                    // 現在のブログは除外
                    if (doc.id !== this.blogId) {
                      const data = doc.data();
                      this.relatedPosts.push({
                        id: doc.id,
                        title: data.title,
                        thumbnail: data.thumbnailUrl,
                        views: data.views || 0,
                        likes: data.likes || 0
                      });
                    }
                  });

                  // 最大3件まで
                  this.relatedPosts = this.relatedPosts.slice(0, 3);
                  
                  // 関連記事が3件未満の場合、別のカテゴリから補充
                  if (this.relatedPosts.length < 3) {
                    const additionalSnapshot = await db.collection('blog_posts')
                      .where('status', '==', 'published')
                      .orderBy('createdAt', 'desc')
                      .limit(5)
                      .get();
                    
                    additionalSnapshot.forEach(doc => {
                      if (doc.id !== this.blogId && !this.relatedPosts.find(p => p.id === doc.id)) {
                        const data = doc.data();
                        this.relatedPosts.push({
                          id: doc.id,
                          title: data.title,
                          thumbnail: data.thumbnailUrl,
                          views: data.views || 0,
                          likes: data.likes || 0
                        });
                      }
                    });
                    
                    // 最大3件まで
                    this.relatedPosts = this.relatedPosts.slice(0, 3);
                  }
                } catch (error) {
                  console.error('関連記事取得エラー:', error);
                  this.relatedPosts = [];
                }
              },

              async toggleLike() {
                try {
                  if (this.hasLiked) {
                    // いいね解除
                    this.blog.likes = Math.max(0, this.blog.likes - 1);
                    this.hasLiked = false;
                    localStorage.removeItem(`blog_liked_${this.blogId}`);

                    await db.collection('blog_posts').doc(this.blogId).update({
                      likes: firebase.firestore.FieldValue.increment(-1)
                    });
                  } else {
                    // いいね追加
                    this.blog.likes++;
                    this.hasLiked = true;
                    localStorage.setItem(`blog_liked_${this.blogId}`, 'true');

                    await db.collection('blog_posts').doc(this.blogId).update({
                      likes: firebase.firestore.FieldValue.increment(1)
                    });
                  }
                } catch (error) {
                  console.error('いいね処理エラー:', error);
                  // エラー時は元に戻す
                  if (this.hasLiked) {
                    this.blog.likes = Math.max(0, this.blog.likes - 1);
                    this.hasLiked = false;
                    localStorage.removeItem(`blog_liked_${this.blogId}`);
                  } else {
                    this.blog.likes++;
                    this.hasLiked = true;
                    localStorage.setItem(`blog_liked_${this.blogId}`, 'true');
                  }
                }
              },

              shareBlog() {
                const url = window.location.href;
                const title = this.blog.title;

                if (navigator.share) {
                  navigator.share({
                    title: title,
                    url: url
                  }).catch(err => console.log('シェアエラー:', err));
                } else {
                  // フォールバック: URLをコピー
                  navigator.clipboard.writeText(url).then(() => {
                    alert('URLをコピーしました');
                  });
                }
              },

              goToBlog(blogId) {
                window.location.href = `/blog/blog-detail.html?id=${blogId}`;
              },

              goToUser(userId) {
                window.location.href = `/user.html?id=${userId}`;
              },

              goBack() {
                window.history.back();
              },

              toggleMenu() {
                this.showMenu = !this.showMenu;
                if (this.showMenu) {
                  document.body.style.overflow = 'hidden';
                } else {
                  document.body.style.overflow = '';
                }
              },

              closeMenu() {
                this.showMenu = false;
                document.body.style.overflow = '';
              },

              handleKeydown(event) {
                if (event.key === 'Escape') {
                  if (this.showMenu) {
                    this.closeMenu();
                  } else {
                    this.goBack();
                  }
                }
              },

              getCategoryLabel(category) {
                const labels = {
                  'touring_report': 'ツーリングレポート',
                  'spot_introduction': 'スポット紹介',
                  'route_explanation': 'ルート解説',
                  'maintenance': 'メンテナンス',
                  'equipment_review': '装備レビュー'
                };
                return labels[category] || category;
              },

              formatDate(date) {
                if (!date) return '';
                const d = date instanceof Date ? date : new Date(date.seconds * 1000);
                return d.toLocaleDateString('ja-JP', {
                  year: 'numeric',
                  month: 'long',
                  day: 'numeric'
                });
              },
              // ブログ編集
              editBlog() {
                if (this.blogId) {
                  window.location.href = `/blog/blog-editor.html?id=${this.blogId}`;
                }
              },
              showToast(message, type = 'success') {
                this.toast.message = message;
                this.toast.type = type;
                this.toast.show = true;

                setTimeout(() => {
                  this.toast.show = false;
                }, 3000);
              },
              // ブログ削除
              async deleteBlog() {
                if (!this.blogId) {
                  alert('ブログIDが見つかりません');
                  return;
                }
                
                // 削除確認
                const confirmMessage = `「${this.blog.title}」を削除しますか?\n\nこの操作は取り消せません。`;
                if (!confirm(confirmMessage)) {
                  return;
                }
                
                // 二重確認
                if (!confirm('本当に削除してもよろしいですか?')) {
                  return;
                }
                
                try {
                  // 1. Firestoreからブログデータを取得
                  const blogDoc = await db.collection('blog_posts').doc(this.blogId).get();
                  
                  if (!blogDoc.exists) {
                    throw new Error('ブログが見つかりません');
                  }

                  const blogData = blogDoc.data();

                  // 2. Firebase Storageから画像を削除
                  const deletePromises = [];

                  // サムネイル画像を削除
                  if (blogData.thumbnailUrl) {
                    try {
                      const thumbnailRef = storage.refFromURL(blogData.thumbnailUrl);
                      deletePromises.push(thumbnailRef.delete());
                      console.log('サムネイル削除予定:', blogData.thumbnailUrl);
                    } catch (error) {
                      console.warn('サムネイル削除エラー:', error);
                    }
                  }

                  // 本文内の画像URLを抽出して削除
                  if (blogData.content) {
                    // Markdown形式の画像: ![alt](url)
                    const imagePattern = /!\[.*?\]\((https:\/\/firebasestorage\.googleapis\.com\/.*?)\)/g;
                    const imageMatches = blogData.content.matchAll(imagePattern);

                    for (const match of imageMatches) {
                      const imageUrl = match[1];
                      try {
                        const imageRef = storage.refFromURL(imageUrl);
                        deletePromises.push(imageRef.delete());
                        console.log('本文画像削除予定:', imageUrl);
                      } catch (error) {
                        console.warn('本文画像削除エラー:', error);
                      }
                    }
                  }

                  // 画像削除を実行（エラーがあっても続行）
                  await Promise.allSettled(deletePromises);

                  // 3. Firestoreからブログドキュメントを削除
                  await db.collection('blog_posts').doc(this.blogId).delete();

                  console.log('ブログ削除成功:', this.blogId);
                  this.showToast('ブログを削除しました', 'success');

                  // ブログ一覧へリダイレクト
                  setTimeout(() => {
                    window.location.href = '/blog/blog.html';
                  }, 1500);

                } catch (error) {
                  console.error('削除エラー:', error);
                  this.showToast(`削除に失敗しました: ${error.message}`, 'error');
                } finally {
                  this.isSaving = false;
                }
              }
            }
          });

          app.mount('#app');
        } catch (error) {
          console.error('アプリケーション初期化エラー:', error);
          document.getElementById('app').innerHTML = `
            <div class="container">
              <div class="error-state">
                <div class="error-icon">⚠️</div>
                <h3>エラーが発生しました</h3>
                <p>${error.message}</p>
              </div>
            </div>
          `;
        }
      });
    </script>
  </body>
</html>
