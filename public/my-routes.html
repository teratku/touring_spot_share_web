<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>バックアップルート | ツーリングスポットシェア</title>
<meta name="description" content="iOSアプリでバックアップした走行ルートをWebで閲覧（Pro限定）。" />
<link rel="canonical" href="https://biketeilen.web.app/my-routes.html" />
<meta name="apple-itunes-app" content="app-id=1466607921" />

<script defer src="/__/firebase/12.4.0/firebase-app-compat.js"></script>
<script defer src="/__/firebase/12.4.0/firebase-firestore-compat.js"></script>
<script defer src="/__/firebase/12.4.0/firebase-auth-compat.js"></script>
<script defer src="/__/firebase/12.4.0/firebase-storage-compat.js"></script>
<script defer src="/__/firebase/init.js"></script>
<script defer src="/subscription.js"></script>
<script defer src="/menu.js"></script>
<script defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBayWrK7IGm5Ceow4uQ_kt02Y2YJaKdG4&callback=onMapsReady"></script>

<style>
  :root { --teal:#00A8C6; --ink:#1f2d3d; --line:#e4e9ee; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif; color:var(--ink); background:#f4f7f9; }
  header { background:linear-gradient(90deg,var(--teal),#0bbed6); color:#fff; padding:12px 18px; display:flex; align-items:center; gap:12px; }
  header h1 { font-size:18px; margin:0; }
  header a { color:#fff; font-size:13px; text-decoration:none; }
  .state { max-width:560px; margin:48px auto; padding:24px; background:#fff; border:1px solid var(--line); border-radius:14px; text-align:center; }
  .state h2 { margin:0 0 8px; }
  .btn { display:inline-block; background:var(--teal); color:#fff; border:none; border-radius:10px; padding:10px 18px; font-weight:700; text-decoration:none; cursor:pointer; }
  .btn.ghost { background:#eef4f6; color:var(--teal); }
  .wrap { display:grid; grid-template-columns:minmax(280px,360px) 1fr; gap:14px; padding:14px; align-items:start; }
  @media (max-width:760px){ .wrap { grid-template-columns:1fr; } #map { height:50vh; } }
  .panel { background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; }
  .listhead { display:flex; align-items:center; gap:8px; padding:4px 6px 10px; }
  .muted { color:#90a4ae; font-size:12px; }
  .rlist { list-style:none; margin:0; padding:0; max-height:72vh; overflow:auto; }
  .ritem { padding:10px; border-radius:10px; cursor:pointer; border:1px solid transparent; }
  .ritem:hover { background:#f2f6f8; }
  .ritem.sel { background:rgba(0,168,198,.10); border-color:var(--teal); }
  .ritem .t { font-weight:700; font-size:14px; }
  .ritem .s { font-size:12px; color:#778; margin-top:2px; }
  #map { height:78vh; border-radius:12px; border:1px solid var(--line); }
  .maphead { display:flex; align-items:center; gap:10px; padding:6px 8px; font-size:13px; }
  .pill { background:rgba(0,168,198,.12); color:var(--teal); padding:3px 10px; border-radius:999px; font-weight:700; font-size:12px; }
</style>
</head>
<body>
  <header>
    <h1>🗺️ バックアップルート</h1>
    <span style="flex:1"></span>
    <a href="/index.html">トップ</a>
  </header>

  <div id="root">
    <div class="state"><h2>読み込み中…</h2></div>
  </div>

<script>
  // ---- 状態 ----
  var fb = { db:null, storage:null, auth:null };
  var mapsReady = false, onMapsReadyResolve = null;
  function onMapsReady(){ mapsReady = true; if (onMapsReadyResolve) onMapsReadyResolve(); }
  function waitMaps(){ return mapsReady ? Promise.resolve() : new Promise(function(r){ onMapsReadyResolve = r; setTimeout(r, 6000); }); }

  var routes = [];          // 一覧
  var selectedId = null;
  var periodSel = 'all';    // 期間フィルタ: 'all' | 'y:2026' | 'm:2026-6'
  var map = null, polyline = null, allPolylines = [];

  // ---- IndexedDB（ジオメトリ・キャッシュ：contentHash 単位） ----
  var idb = {
    _p:null,
    open:function(){ if(this._p) return this._p; this._p=new Promise(function(res,rej){ var r=indexedDB.open('tss-routes',1); r.onupgradeneeded=function(){ r.result.createObjectStore('geom'); }; r.onsuccess=function(){ res(r.result); }; r.onerror=function(){ rej(r.error); }; }); return this._p; },
    get:function(k){ return this.open().then(function(db){ return new Promise(function(res){ var t=db.transaction('geom').objectStore('geom').get(k); t.onsuccess=function(){ res(t.result||null); }; t.onerror=function(){ res(null); }; }); }).catch(function(){ return null; }); },
    set:function(k,v){ return this.open().then(function(db){ return new Promise(function(res){ var t=db.transaction('geom','readwrite').objectStore('geom').put(v,k); t.onsuccess=function(){ res(true); }; t.onerror=function(){ res(false); }; }); }).catch(function(){ return false; }); }
  };

  // ---- 起動 ----
  window.addEventListener('load', function () {
    // defer スクリプトの読み込み完了を待ってから firebase を使う
    var tries = 0;
    (function ready(){
      if (typeof firebase === 'undefined' || !firebase.auth) { if (tries++ < 50) return setTimeout(ready, 100); render('error', 'Firebase の初期化に失敗しました'); return; }
      fb.db = firebase.firestore(); fb.storage = firebase.storage(); fb.auth = firebase.auth();
      firebase.auth().onAuthStateChanged(function (user) { boot(user); });
    })();
  });

  async function boot(user) {
    if (!user) { render('login'); return; }
    // Pro ゲート
    var sub = await TSSSubscription.forCurrentUser(true);
    if (!sub.isSubscribed) { render('upsell', sub); return; }
    render('app');
    await loadList(user.uid, false);
  }

  // ---- 一覧の取得（routeCount でキャッシュ） ----
  async function loadList(uid, force) {
    var listEl = document.getElementById('rlist');
    var statusEl = document.getElementById('liststatus');
    statusEl.textContent = '読み込み中…';
    try {
      // index doc（1 read）で版数を取得
      var idxSnap = await fb.db.collection('route_backups').doc(uid).get();
      var routeCount = idxSnap.exists ? (idxSnap.data().routeCount || 0) : 0;
      var cacheKey = 'tss_routelist_' + uid;
      var cached = null;
      try { cached = JSON.parse(localStorage.getItem(cacheKey) || 'null'); } catch (_) {}

      var cacheFresh = cached && cached.schema === 'v2' && cached.version === routeCount && Array.isArray(cached.routes) && (Date.now() - (cached.ts || 0) < 30 * 60 * 1000);
      if (!force && cacheFresh) {
        routes = cached.routes;
        statusEl.textContent = routes.length + ' 件（キャッシュ）';
      } else {
        var snap = await fb.db.collection('route_backups').doc(uid).collection('routes').orderBy('startTime', 'desc').get();
        routes = snap.docs.map(function (d) {
          var x = d.data() || {};
          return {
            id: d.id,
            title: x.title || '走行記録',
            startTime: x.startTime && x.startTime.toDate ? x.startTime.toDate().getTime() : null,
            duration: x.recordingDuration || 0,
            storagePath: x.storagePath || null,
            markersPath: x.markersStoragePath || null,
            segmentsPath: x.segmentsStoragePath || null,
            spotsMetaPath: x.spotsMetaStoragePath || null,
            contentHash: x.contentHash || d.id
          };
        });
        try { localStorage.setItem(cacheKey, JSON.stringify({ schema: 'v2', version: routeCount, ts: Date.now(), routes: routes })); } catch (_) {}
        statusEl.textContent = routes.length + ' 件';
      }
      renderList();
    } catch (e) {
      statusEl.textContent = '❌ ' + e.message + '（ルールで route_backups の本人読取が必要）';
    }
  }

  // ---- 期間フィルタ（全期間 / 年 / 月） ----
  function filteredRoutes() {
    if (periodSel === 'all') return routes;
    if (periodSel.indexOf('y:') === 0) {
      var y = +periodSel.slice(2);
      return routes.filter(function (r) { return r.startTime && new Date(r.startTime).getFullYear() === y; });
    }
    if (periodSel.indexOf('m:') === 0) {
      var p = periodSel.slice(2).split('-'); var yy = +p[0], mm = +p[1];
      return routes.filter(function (r) { if (!r.startTime) return false; var d = new Date(r.startTime); return d.getFullYear() === yy && (d.getMonth() + 1) === mm; });
    }
    return routes;
  }
  function renderPeriodSelect() {
    var sel = document.getElementById('periodSel'); if (!sel) return;
    var years = {}, months = {};
    routes.forEach(function (r) { if (!r.startTime) return; var d = new Date(r.startTime); years[d.getFullYear()] = 1; months[d.getFullYear() + '-' + (d.getMonth() + 1)] = 1; });
    var yKeys = Object.keys(years).map(Number).sort(function (a, b) { return b - a; });
    var mKeys = Object.keys(months).map(function (k) { var q = k.split('-'); return { y: +q[0], m: +q[1] }; }).sort(function (a, b) { return (b.y - a.y) || (b.m - a.m); });
    var html = '<option value="all">全期間</option>';
    yKeys.forEach(function (y) { html += '<option value="y:' + y + '">' + y + '年</option>'; });
    mKeys.forEach(function (o) { html += '<option value="m:' + o.y + '-' + o.m + '">' + o.y + '年' + o.m + '月</option>'; });
    sel.innerHTML = html; sel.value = periodSel;
  }
  function onPeriodChange(v) { periodSel = v; renderList(); }

  function renderList() {
    renderPeriodSelect();
    var el = document.getElementById('rlist');
    if (!routes.length) { el.innerHTML = '<li class="muted" style="padding:12px">バックアップがありません（アプリでバックアップしてください）。</li>'; return; }
    var list = filteredRoutes();
    var status = document.getElementById('liststatus');
    if (status) status.textContent = list.length + ' 件' + (periodSel === 'all' ? '' : '（絞り込み中）');
    if (!list.length) { el.innerHTML = '<li class="muted" style="padding:12px">この期間のルートはありません。</li>'; return; }
    el.innerHTML = list.map(function (r) {
      var d = r.startTime ? new Date(r.startTime).toLocaleString('ja-JP', { year:'numeric', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '日時不明';
      return '<li class="ritem' + (r.id === selectedId ? ' sel' : '') + '" data-id="' + r.id + '">' +
             '<div class="t">' + esc(r.title) + '</div><div class="s">' + d + ' · ' + fmtDur(r.duration) + '</div></li>';
    }).join('');
    Array.prototype.forEach.call(el.querySelectorAll('.ritem'), function (li) {
      li.onclick = function () { selectRoute(li.getAttribute('data-id')); };
    });
  }

  // ---- ジオメトリ取得（IndexedDB キャッシュ） ----
  async function getGeometry(r) {
    if (!r || !r.storagePath) return { pts: [], cached: false };
    var pts = await idb.get(r.contentHash);
    if (pts) return { pts: pts, cached: true };
    var url = await fb.storage.ref(r.storagePath).getDownloadURL();
    var json = await (await fetch(url)).json();
    var raw = json.routePoints || (Array.isArray(json) ? json : []);
    pts = raw.map(function (p) { return { lat: Number(p.latitude), lng: Number(p.longitude) }; })
             .filter(function (p) { return isFinite(p.lat) && isFinite(p.lng); });
    await idb.set(r.contentHash, pts);
    return { pts: pts, cached: false };
  }
  function clearAllPolylines() { allPolylines.forEach(function (p) { p.setMap(null); }); allPolylines = []; }

  // ---- 全ルートを地図に重ねて表示（期間フィルタ適用） ----
  async function drawAllRoutes() {
    await waitMaps();
    if (!window.google || !google.maps) return;
    selectedId = null; renderList();
    if (polyline) { polyline.setMap(null); polyline = null; }
    if (typeof clearSpots === 'function') clearSpots();
    clearAllPolylines();
    if (!map) map = new google.maps.Map(document.getElementById('map'), { center: { lat: 36.5, lng: 138 }, zoom: 5, disableDefaultUI: true, zoomControl: true });
    var list = filteredRoutes();
    var info = document.getElementById('mapinfo');
    var bounds = new google.maps.LatLngBounds(), total = 0, drawn = 0;
    var cap = Math.min(list.length, 300);
    for (var i = 0; i < cap; i++) {
      info.textContent = '全ルート読み込み中… ' + (i + 1) + '/' + cap;
      var g;
      try { g = await getGeometry(list[i]); } catch (e) { continue; }
      if (!g.pts.length) continue;
      var pl = new google.maps.Polyline({ path: g.pts, strokeColor: '#e53935', strokeOpacity: 0.45, strokeWeight: 3, map: map });
      allPolylines.push(pl);
      g.pts.forEach(function (p) { bounds.extend(p); });
      total += distanceOf(g.pts); drawn++;
    }
    if (drawn) map.fitBounds(bounds);
    info.innerHTML = '<span class="pill">全ルート</span> ' + drawn + '本 · ' + fmtKm(total) + (list.length > cap ? '（上限' + cap + '）' : '');
  }

  // ---- ルート選択 → ジオメトリ取得（IndexedDB キャッシュ） → 地図描画 ----
  async function selectRoute(id) {
    selectedId = id; renderList();
    var r = routes.find(function (x) { return x.id === id; });
    if (!r || !r.storagePath) return;
    var info = document.getElementById('mapinfo');
    info.textContent = '読み込み中…';
    try {
      var g = await getGeometry(r);
      var pts = g.pts, fromCache = g.cached;
      await waitMaps();
      drawRoute(pts);
      var baseInfo = '<span class="pill">' + esc(r.title) + '</span> ' + pts.length + '点 · ' + fmtKm(distanceOf(pts)) + (fromCache ? ' · キャッシュ' : '');
      info.innerHTML = baseInfo;

      // スポット(markers+spots_meta)と道路サマリ(segments)を追加読込（contentHash でキャッシュ）
      try {
        var segJson = await fetchAndCacheJSON(r.contentHash + ':seg', r.segmentsPath);
        var markersJson = await fetchAndCacheJSON(r.contentHash + ':mk', r.markersPath);
        var spotsJson = await fetchAndCacheJSON(r.contentHash + ':sp', r.spotsMetaPath);
        drawSpots(markersJson, spotsJson);
        var nSpots = ((markersJson || []).filter(function (m) { return m.type === 'spot'; })).length;
        info.innerHTML = baseInfo + (nSpots ? ' · 📍' + nSpots + 'スポット' : '') + topRoads(segJson);
      } catch (e2) { /* 付帯情報の失敗は本線描画に影響させない */ }
    } catch (e) {
      info.textContent = '❌ ' + e.message + '（Storageルールで本人読取が必要）';
    }
  }

  // ---- Storage JSON 取得（IndexedDB キャッシュ） ----
  async function fetchAndCacheJSON(idbKey, storagePath) {
    if (!storagePath) return null;
    var cached = await idb.get(idbKey);
    if (cached) return cached;
    try {
      var url = await fb.storage.ref(storagePath).getDownloadURL();
      var json = await (await fetch(url)).json();
      await idb.set(idbKey, json);
      return json;
    } catch (e) { return null; }
  }

  // ---- 道路サマリ（segments を距離合算して上位5本） ----
  function topRoads(segJson) {
    if (!segJson || !Array.isArray(segJson.segments)) return '';
    var agg = {};
    segJson.segments.forEach(function (s) {
      var n = (s.name || '').trim();
      if (!n || n === 'ー' || n === '-') return;
      agg[n] = (agg[n] || 0) + (s.distance || 0);
    });
    var arr = Object.keys(agg).map(function (n) { return { n: n, d: agg[n] }; }).sort(function (a, b) { return b.d - a.d; }).slice(0, 5);
    if (!arr.length) return '';
    return '<div class="muted" style="margin-top:6px">🛣 ' + arr.map(function (x) { return esc(x.n) + '(' + x.d.toFixed(1) + 'km)'; }).join(' · ') + '</div>';
  }

  // ---- スポットマーカー（markers type=="spot" ＋ spots_meta の名前/写真） ----
  var spotMarkers = [], spotInfoWindow = null;
  function clearSpots() { spotMarkers.forEach(function (m) { m.setMap(null); }); spotMarkers = []; }
  function drawSpots(markersJson, spotsJson) {
    clearSpots();
    if (!map || !window.google) return;
    var metaById = {};
    (spotsJson || []).forEach(function (e) { var it = (e && e.item) || {}; if (it.spotID) metaById[it.spotID] = { name: it.locationName || 'スポット', imgs: e.imageStoragePaths || [] }; });
    (markersJson || []).filter(function (m) { return m.type === 'spot'; }).forEach(function (m) {
      var pos = { lat: Number(m.latitude), lng: Number(m.longitude) };
      if (!isFinite(pos.lat) || !isFinite(pos.lng)) return;
      var mk = new google.maps.Marker({ position: pos, map: map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 7, fillColor: '#e8770a', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 } });
      mk.addListener('click', function () { openSpotInfo(mk, metaById[m.spotID]); });
      spotMarkers.push(mk);
    });
  }
  async function imgURL(path) {
    var k = 'tss_img_' + path;
    var c = localStorage.getItem(k); if (c) return c;
    try { var u = await fb.storage.ref(path).getDownloadURL(); try { localStorage.setItem(k, u); } catch (_) {} return u; } catch (e) { return null; }
  }
  async function openSpotInfo(marker, meta) {
    if (!spotInfoWindow) spotInfoWindow = new google.maps.InfoWindow();
    meta = meta || { name: 'スポット', imgs: [] };
    var div = document.createElement('div'); div.style.maxWidth = '230px'; div.style.fontSize = '13px';
    div.innerHTML = '<div style="font-weight:700;margin-bottom:6px">' + esc(meta.name) + '</div><div class="imgrow muted">写真読み込み中…</div>';
    spotInfoWindow.setContent(div); spotInfoWindow.open(map, marker);
    var urls = await Promise.all((meta.imgs || []).slice(0, 4).map(imgURL));
    var valid = urls.filter(Boolean);
    var row = div.querySelector('.imgrow');
    if (row) row.innerHTML = valid.length
      ? '<div style="display:flex;flex-wrap:wrap;gap:4px">' + valid.map(function (u) { return '<img src="' + u + '" loading="lazy" style="width:100px;height:74px;object-fit:cover;border-radius:6px">'; }).join('') + '</div>'
      : '<span class="muted">写真なし</span>';
  }

  function drawRoute(pts) {
    if (!window.google || !google.maps) return;
    if (!map) map = new google.maps.Map(document.getElementById('map'), { center:{lat:36.5,lng:138}, zoom:5, disableDefaultUI:true, zoomControl:true });
    if (polyline) polyline.setMap(null);
    clearAllPolylines();
    clearSpots();
    if (spotInfoWindow) spotInfoWindow.close();
    if (!pts.length) return;
    polyline = new google.maps.Polyline({ path: pts, strokeColor:'#e53935', strokeWeight:6, strokeOpacity:0.9, map: map });
    var b = new google.maps.LatLngBounds();
    pts.forEach(function (p) { b.extend(p); });
    map.fitBounds(b);
    new google.maps.Marker({ position: pts[0], map: map, label: 'S' });
    new google.maps.Marker({ position: pts[pts.length - 1], map: map, label: 'G' });
  }

  // ---- 画面状態 ----
  function render(state, data) {
    var root = document.getElementById('root');
    if (state === 'login') {
      root.innerHTML = '<div class="state"><h2>ログインが必要です</h2><p class="muted">バックアップルートは本人のみ閲覧できます。</p><a class="btn" href="/login.html">ログイン</a></div>';
    } else if (state === 'upsell') {
      root.innerHTML = '<div class="state"><h2>Pro限定機能です</h2><p class="muted">ルートバックアップの閲覧は Pro プランでご利用いただけます。' +
        (data && data.noData ? '<br>（まだバックアップデータがありません）' : '') + '</p>' +
        '<a class="btn" href="https://apps.apple.com/jp/app/id1466607921" target="_blank" rel="noopener">アプリでProを確認</a></div>';
    } else if (state === 'error') {
      root.innerHTML = '<div class="state"><h2>エラー</h2><p class="muted">' + esc(data || '') + '</p></div>';
    } else if (state === 'app') {
      root.innerHTML =
        '<div class="wrap">' +
          '<div class="panel">' +
            '<div class="listhead"><strong>あなたのバックアップ</strong><span style="flex:1"></span>' +
              '<select id="periodSel" onchange="onPeriodChange(this.value)" style="font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:6px"></select>' +
              '<button class="btn ghost" style="padding:6px 10px;font-size:12px" onclick="drawAllRoutes()">全ルート</button>' +
              '<button class="btn ghost" style="padding:6px 10px;font-size:12px" onclick="forceReload()">更新</button></div>' +
            '<div class="muted" id="liststatus" style="padding:0 6px 6px"></div>' +
            '<ul class="rlist" id="rlist"></ul>' +
          '</div>' +
          '<div class="panel">' +
            '<div class="maphead" id="mapinfo"><span class="muted">左の一覧からルートを選択してください</span></div>' +
            '<div id="map"></div>' +
          '</div>' +
        '</div>';
    }
  }
  async function forceReload() { var u = fb.auth.currentUser; if (u) await loadList(u.uid, true); }

  // ---- ユーティリティ ----
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function fmtDur(sec){ sec=Math.round(sec||0); var h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60); return h>0?(h+'時間'+m+'分'):(m+'分'); }
  function fmtKm(m){ return m<1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km'; }
  function distanceOf(pts){ var R=6371000, t=0; for(var i=1;i<pts.length;i++){ var a=pts[i-1],b=pts[i]; var dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180; var s=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2); t+=2*R*Math.asin(Math.sqrt(s)); } return t; }
</script>
</body>
</html>
